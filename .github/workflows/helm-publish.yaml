name: Helm Publish

on:
  push:
    branches: ['main']
    paths-ignore:
      - '.github/**'
      - '.git*'
      - 'README.md'
  workflow_dispatch:

jobs:
  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.12.3

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Push all packaged Helm charts to GHCR
        run: |
          shopt -s nullglob
          for chart in charts/*.tgz; do
            echo "Pushing $chart"
            helm push "$chart" oci://ghcr.io/falkordb/helm-charts
          done
